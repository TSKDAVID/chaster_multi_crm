name: Deploy CRM to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-crm
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SB_PUBLISHABLE_KEY: ${{ secrets.VITE_SB_PUBLISHABLE_KEY }}
      VITE_INBOUND_EMAIL: ${{ vars.VITE_INBOUND_EMAIL }}
      VITE_ATTACHMENTS_BUCKET: ${{ vars.VITE_ATTACHMENTS_BUCKET }}
      VITE_GOOGLE_WORKPLACE_DOMAIN: ${{ vars.VITE_GOOGLE_WORKPLACE_DOMAIN }}
      VITE_DISABLE_EMAIL_PASSWORD_AUTHENTICATION: ${{ vars.VITE_DISABLE_EMAIL_PASSWORD_AUTHENTICATION }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci
        working-directory: atomic-crm

      - name: Build app
        run: npm run build
        working-directory: atomic-crm

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: atomic-crm/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4